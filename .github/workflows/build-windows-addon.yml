name: Build Windows DeckLink addon

# Builds decklink_addon.node for Windows x64 and uploads it as a release asset.
# Triggers:
#   - Manually via the "Run workflow" button (workflow_dispatch)
#   - On every push of a v* tag (auto-attaches to the matching GitHub Release)
#
# SDK source (in priority order):
#   1. A draft release in this repo tagged `sdk-internal-do-not-publish` with
#      a .zip asset containing Win/include/DeckLinkAPI.idl. Drafts are not
#      publicly visible; the workflow's GITHUB_TOKEN can still read them.
#      This is the default setup.
#   2. Optional: BMD_SDK_URL repository secret pointing at an external .zip
#      URL you host yourself (S3/R2/etc.). Takes precedence if both are set.
#
# Blackmagic's SDK EULA prohibits public redistribution; the draft-release
# approach keeps the headers private to the repo's collaborators while
# letting CI build the addon automatically.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach the addon to (e.g. v6.3.1). Leave blank to skip upload.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # needed to read draft release assets AND attach addon to release

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve SDK source
        id: sdk_check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ secrets.BMD_SDK_URL }}") {
            echo "source=external" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "Using BMD_SDK_URL secret as SDK source."
            echo "has_sdk=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            # Probe for the draft release that holds the SDK zip
            $draft = gh release view sdk-internal-do-not-publish --repo ${{ github.repository }} --json tagName,isDraft 2>$null
            if ($LASTEXITCODE -eq 0 -and $draft) {
              echo "source=draft" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              echo "has_sdk=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "Using draft release 'sdk-internal-do-not-publish' as SDK source."
            } else {
              echo "has_sdk=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "::notice::No SDK source configured (neither BMD_SDK_URL secret nor 'sdk-internal-do-not-publish' draft release). Skipping CI addon build; releases need a manually-attached addon. To enable CI: upload Win/include as a zip to a draft release tagged 'sdk-internal-do-not-publish'."
            }
          }

      - name: Install npm dependencies
        if: steps.sdk_check.outputs.has_sdk == 'true'
        run: npm ci

      - name: Download DeckLink SDK
        if: steps.sdk_check.outputs.has_sdk == 'true'
        shell: pwsh
        env:
          BMD_SDK_URL: ${{ secrets.BMD_SDK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force -Path bmd-sdk | Out-Null
          if ("${{ steps.sdk_check.outputs.source }}" -eq "external") {
            Invoke-WebRequest -Uri $env:BMD_SDK_URL -OutFile bmd-sdk.zip
          } else {
            # Pull from the draft release. gh release download --pattern grabs the matching asset.
            gh release download sdk-internal-do-not-publish --repo ${{ github.repository }} --pattern "*.zip" --output bmd-sdk.zip
          }
          Expand-Archive -Path bmd-sdk.zip -DestinationPath bmd-sdk -Force
          # Locate the Win/include directory inside the unpacked SDK
          $includeDir = Get-ChildItem -Path bmd-sdk -Recurse -Directory -Filter 'include' |
            Where-Object { Test-Path (Join-Path $_.FullName 'DeckLinkAPI.idl') } |
            Select-Object -First 1
          if (-not $includeDir) {
            Write-Error "DeckLink SDK download did not contain DeckLinkAPI.idl under any include/ directory. Confirm the zip layout."
            exit 1
          }
          echo "BMD_SDK_DIR=$($includeDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Using SDK at $($includeDir.FullName)"

      - name: Set up MSVC dev environment
        if: steps.sdk_check.outputs.has_sdk == 'true'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure + build native addon
        if: steps.sdk_check.outputs.has_sdk == 'true'
        shell: pwsh
        run: |
          # cmake-js with extra cmake args pointing at the SDK
          npx cmake-js compile --directory native/decklink --CDBMD_SDK_DIR="$env:BMD_SDK_DIR" --config Release

      - name: Show output + checksum
        if: steps.sdk_check.outputs.has_sdk == 'true'
        shell: pwsh
        run: |
          $node = 'native/decklink/build/Release/decklink_addon.node'
          if (-not (Test-Path $node)) {
            Write-Error "Build did not produce $node"
            exit 1
          }
          $size = (Get-Item $node).Length
          $hash = (Get-FileHash $node -Algorithm SHA256).Hash
          Write-Host "Built: $node ($size bytes)"
          Write-Host "SHA256: $hash"
          Copy-Item $node "decklink_addon-windows-x64.node"

      - name: Upload as workflow artifact (always)
        if: steps.sdk_check.outputs.has_sdk == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: decklink_addon-windows-x64
          path: decklink_addon-windows-x64.node

      - name: Resolve release tag
        if: steps.sdk_check.outputs.has_sdk == 'true'
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $t = "${{ github.ref_name }}"
          } else {
            $t = "${{ github.event.inputs.release_tag }}"
          }
          echo "tag=$t" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Resolved release tag: $t"

      - name: Attach addon to GitHub Release
        if: steps.sdk_check.outputs.has_sdk == 'true' && steps.tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: decklink_addon-windows-x64.node
          fail_on_unmatched_files: false
